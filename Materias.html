<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Matérias</title>
    <link rel="stylesheet" href="materias.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">🎓</span> StudyFlow
        </div>
         <nav>
                
                <a href="home.html" class="nav-item active"><i data-lucide="home"></i> Inícao</a>
                <a href="calendario.html" class="nav-item"><i data-lucide="calendar"></i> Calendário</a>
                <a href="materias.html" class="nav-item"><i data-lucide="book-open"></i> Matérias</a>
                <a href="cronometro.html" class="nav-item"><i data-lucide="timer"></i> Cronômetro</a>
        </nav>
    </header>

    <main class="container">
        <section class="header-content">
            <div class="title-group">
                <h1>Matérias</h1>
                <p>Cadastre e organize suas matérias</p>
            </div>
            <button class="btn-new">+ Nova Matéria</button>
        </section>

        <div class="subjects-grid">
            <div class="subject-card">
                <div class="icon-box bg-blue">📐</div>
                <div class="subject-info">
                    <h3>Matemática</h3>
                    <span class="color-tag"><i class="dot blue"></i> #6366f1</span>
                </div>
            </div>

            <div class="subject-card">
                <div class="icon-box bg-red">🌍</div>
                <div class="subject-info">
                    <h3>História</h3>
                    <span class="color-tag"><i class="dot red"></i> #f43f5e</span>
                </div>
            </div>

            <div class="subject-card">
                <div class="icon-box bg-green">🔬</div>
                <div class="subject-info">
                    <h3>Biologia</h3>
                    <span class="color-tag"><i class="dot green"></i> #22c55e</span>
                </div>
            </div>

            <div class="subject-card">
                <div class="icon-box bg-orange">📖</div>
                <div class="subject-info">
                    <h3>Português</h3>
                    <span class="color-tag"><i class="dot orange"></i> #f97316</span>
                </div>
            </div>

            <div class="subject-card">
                <div class="icon-box bg-purple">🧪</div>
                <div class="subject-info">
                    <h3>Física</h3>
                    <span class="color-tag"><i class="dot purple"></i> #8b5cf6</span>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
